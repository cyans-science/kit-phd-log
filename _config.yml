title: "Cyan's PhD Notebook"
description: "Research logs, paper notes, and scientific writing practice."

url: "https://cyans-science.github.io"
baseurl: "/kit-phd-notebook"

markdown: kramdown

permalink: /:categories/:year/:month/:day/:title/

defaults:
  - scope:
      path: "_posts/logs"
      type: "posts"
    values:
      layout: "post"
      category: "logs"

  - scope:
      path: "_posts/papers"
      type: "posts"
    values:
      layout: "post"
      category: "papers"

  - scope:
      path: "_posts/rewrites"
      type: "posts"
    values:
      layout: "post"
      category: "rewrites"